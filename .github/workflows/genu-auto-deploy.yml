name: GenU AutoDeploy

on:
  pull_request_target:
    types: [labeled, synchronize, closed]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'auto-deploy') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'auto-deploy'))
    runs-on: ubuntu-latest
    steps:
      - name: Clone fork repository (same as CodeBuild buildspec)
        run: |
          echo "=== This replicates what the CodeBuild buildspec does ==="
          echo "HEAD_REPOSITORY=${HEAD_REPOSITORY}"
          echo "HEAD_REF=${HEAD_REF}"
          echo ""
          echo "Cloning fork repository..."
          git clone --branch ${HEAD_REF} https://github.com/${HEAD_REPOSITORY}.git /tmp/source
          cd /tmp/source
          node --version
          npm --version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Install dependencies (npm ci runs fork's package.json)
        run: |
          cd /tmp/source
          echo "Running npm ci on fork's package.json..."
          echo "In the real workflow, AWS OIDC credentials are present in the environment"
          npm ci
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Deploy (simulated)
        run: |
          echo "In the real workflow, this step runs:"
          echo "  npx -w packages/cdk cdk deploy --require-approval never --all"
          echo "The fork's CDK code gets deployed into AWS account 047385030331"
